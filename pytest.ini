# ============================================================
# pytest.ini
# Pytest 配置文件 —— 控制测试发现规则、输出格式和报告路径
# ============================================================

[pytest]
# ---- 测试发现规则 ----
python_files = test_*.py     # 测试文件名匹配模式
python_classes = Test*       # 测试类名匹配模式
python_functions = test_*    # 测试方法名匹配模式

# ---- 默认运行参数 ----
# -v: 详细输出（显示每个用例名称）
# -s: 显示 print 输出
# --alluredir: Allure 报告数据输出目录
addopts = -v -s --alluredir=./reports/allure-results

# ---- 测试目录 ----
testpaths = testcases


# ---- 自定义标记 ----
# 用法: @pytest.mark.smoke 或 @pytest.mark.regression
markers =
    smoke: 冒烟测试（核心功能快速验证）
    regression: 回归测试（完整功能覆盖）
