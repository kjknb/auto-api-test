# ============================================================
# data/user_data.yaml
# 测试数据文件 —— 集中管理所有测试场景的输入数据和预期结果
# 新增测试场景只需在这里加条目，不用改测试代码
# ============================================================

# ---- 注册接口测试数据 ----
register:
  - title: "正常注册"                    # 用例标题（显示在测试报告中）
    username: "test_user_001"
    password: "123456"
    expected_code: 0                    # 期望的业务码：0 = 成功

  - title: "重复注册"                    # 同一用户再次注册
    username: "test_user_001"
    password: "123456"
    expected_code: 1001                 # 1001 = 用户已存在

  - title: "空用户名注册"                # 用户名为空
    username: ""
    password: "123456"
    expected_code: 1002                 # 1002 = 用户名不能为空

# ---- 登录接口测试数据 ----
login:
  - title: "正确登录"
    username: "test_user_001"
    password: "123456"
    expected_code: 0

  - title: "错误密码"                    # 密码不正确
    username: "test_user_001"
    password: "wrong_password"
    expected_code: 1003                 # 1003 = 密码错误

  - title: "不存在的用户"                # 用户名不存在
    username: "non_exist_user"
    password: "123456"
    expected_code: 1004                 # 1004 = 用户不存在

# ---- 更新接口测试数据 ----
update:
  - title: "更新用户名"
    field: "username"
    value: "test_user_001_updated"
    expected_code: 0

  - title: "更新手机号"
    field: "phone"
    value: "13800138000"
    expected_code: 0
