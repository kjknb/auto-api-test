# data/user_data.yaml
# 用户模块测试数据

register:
  - title: "正常注册"
    username: "test_user_001"
    password: "123456"
    expected_code: 0

  - title: "重复注册"
    username: "test_user_001"
    password: "123456"
    expected_code: 1001  # 用户已存在

  - title: "空用户名注册"
    username: ""
    password: "123456"
    expected_code: 1002  # 用户名不能为空

login:
  - title: "正确登录"
    username: "test_user_001"
    password: "123456"
    expected_code: 0

  - title: "错误密码"
    username: "test_user_001"
    password: "wrong_password"
    expected_code: 1003  # 密码错误

  - title: "不存在的用户"
    username: "non_exist_user"
    password: "123456"
    expected_code: 1004  # 用户不存在

update:
  - title: "更新用户名"
    field: "username"
    value: "test_user_001_updated"
    expected_code: 0

  - title: "更新手机号"
    field: "phone"
    value: "13800138000"
    expected_code: 0
