# ============================================================
# docker-compose.yml
# 一键部署 —— 启动被测服务 + MySQL + Redis + Jenkins
# 用法：docker-compose up -d
# ============================================================

version: "3.8"

services:
  # ---- MySQL 数据库 ----
  mysql:
    image: mysql:8.0
    container_name: auto-test-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-appdb}
    ports:
      - "3307:3306"         # 宿主机 3307 端口映射到容器 3306（避免与本地 MySQL 冲突）
    volumes:
      - mysql-data:/var/lib/mysql    # 数据持久化
    networks:
      - test_net
    healthcheck:
      # 健康检查：MySQL 能 ping 通才算启动完成
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-123456}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- Redis 缓存 ----
  redis:
    image: redis:7.2
    container_name: auto-test-redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-123456}"]
    ports:
      - "6379:6379"
    networks:
      - test_net

  # ---- 被测服务（根据实际项目替换 Dockerfile） ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto-test-app
    restart: always
    depends_on:
      mysql:
        condition: service_healthy    # 等 MySQL 健康检查通过后再启动
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_NAME: ${DB_NAME:-appdb}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
    networks:
      - test_net

  # ---- Jenkins（CI/CD 服务） ----
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: auto-test-jenkins
    user: root
    restart: always
    ports:
      - "9090:8080"         # 访问 Jenkins：http://localhost:9090
      - "50000:50000"       # Jenkins agent 通信端口
    volumes:
      - jenkins_home:/var/jenkins_home                    # Jenkins 数据持久化
      - /var/run/docker.sock:/var/run/docker.sock         # 允许 Jenkins 使用宿主机 Docker
      - /usr/bin/docker:/usr/bin/docker
      - /etc/localtime:/etc/localtime:ro                  # 同步时区
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"  # 跳过安装向导
    networks:
      - test_net

# ---- 数据卷 ----
volumes:
  mysql-data:       # MySQL 数据
  jenkins_home:     # Jenkins 配置和构建历史

# ---- 内部网络 ----
networks:
  test_net:
    driver: bridge
